<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Tetris</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #2a2f3d;   /* lighter than the black playfield so it stands out */
      color: #f0f2f8;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 { margin: 1rem 0 0.25rem; letter-spacing: 0.05em; }
    .hint { color: #c2c7d6; font-size: 0.9rem; margin: 0 0 1rem; }
    a.back { color: #6cd0ff; text-decoration: none; margin-top: 1rem; }
    canvas {
      background: #000;
      /* A clear border + glow so the black playfield reads as its own panel,
         distinct from the page behind it. */
      border: 2px solid #4cc2ff;
      border-radius: 8px;
      box-shadow: 0 0 0 1px #000, 0 8px 24px rgba(0, 0, 0, 0.5);
      /* Crisp blocks, no blurry scaling. */
      image-rendering: pixelated;
      /* Never let the board overflow -- it scales down to fit. The canvas keeps
         its own internal pixel resolution; only the displayed size changes, so
         the blocks stay sharp. */
      max-width: 100%;
      max-height: 100%;
    }

    /* ---- The on-screen gamepad ----
       Two thumb clusters that flank the board, mirroring a PS3 pad: directions
       on the LEFT, action buttons (rotate/drop) on the RIGHT. Hidden by default
       (desktop); only shown on a touch phone in landscape, further down. */
    .pad {
      display: none;
      flex-direction: column;
      gap: 14px;
      align-items: center;
      justify-content: center;
    }
    .pad-row { display: flex; gap: 14px; }
    .btn {
      width: 72px;
      height: 72px;
      border-radius: 14px;
      border: 2px solid #4cc2ff;
      background: rgba(76, 194, 255, 0.15);
      color: #f0f2f8;
      font-size: 1.6rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;       /* taps drive the game, never scroll/zoom */
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { background: rgba(76, 194, 255, 0.4); }
    .btn-wide { width: 112px; font-size: 1rem; }

    /* A little fullscreen toggle, tucked in the top-right corner. Tapping it
       makes the game take the whole screen (hiding the browser's URL bar) on
       phones that support it. Hidden by default; revealed on touch landscape,
       and removed entirely by JS on phones that can't go fullscreen (iPhone). */
    #btn-fullscreen {
      display: none;
      position: fixed;
      top: 6px;
      right: 6px;
      z-index: 10;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: 1px solid #4cc2ff;
      background: rgba(76, 194, 255, 0.12);
      color: #f0f2f8;
      font-size: 1.1rem;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* Shown only on a phone held in portrait (set up by the media query). */
    #rotate-hint { display: none; }

    /* On a touch phone in LANDSCAPE: lay the page out as one row,
       [ D-pad ] [ board ] [ actions ], sized to the screen height. */
    @media (hover: none) and (pointer: coarse) and (orientation: landscape) {
      h1, .hint, a.back { display: none; }   /* free up space for the game */
      body {
        flex-direction: row;
        justify-content: center;
        gap: 16px;
        height: 100vh;       /* fallback for old browsers */
        height: 100dvh;      /* the *visible* height -- grows as the URL bar
                                collapses, so the game fills the real screen */
        padding: 8px;
        box-sizing: border-box;
      }
      .pad { display: flex; }                /* reveal both thumb pads */
      canvas { height: 100%; width: auto; }  /* board fills the height */
      #btn-fullscreen { display: flex; }     /* offer the fullscreen toggle */
    }

    /* On a touch phone in PORTRAIT: ask the player to turn sideways rather than
       cram the landscape gamepad into a tall, narrow screen. */
    @media (hover: none) and (pointer: coarse) and (orientation: portrait) {
      h1, .hint, a.back, canvas, .pad { display: none; }
      #rotate-hint {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        height: 100vh;
        height: 100dvh;
        text-align: center;
        font-size: 1.3rem;
        padding: 2rem;
        box-sizing: border-box;
      }
      #rotate-hint .spin { font-size: 3rem; }
    }
  </style>
</head>
<body>
  <h1>Tetris</h1>
  <p class="hint">← → move &nbsp;·&nbsp; ↑ rotate &nbsp;·&nbsp; ↓ soft drop &nbsp;·&nbsp; Space hard drop</p>

  <!-- LEFT thumb pad: directions (the "D-pad"). Direct body child so it sits to
       the board's left when the landscape layout turns body into a row. -->
  <div class="pad" id="pad-left">
    <div class="pad-row">
      <button class="btn" id="btn-left" aria-label="Move left">◀</button>
      <button class="btn" id="btn-down" aria-label="Soft drop">▼</button>
      <button class="btn" id="btn-right" aria-label="Move right">▶</button>
    </div>
  </div>

  <canvas id="game"></canvas>

  <!-- RIGHT thumb pad: actions (rotate + hard drop), like the PS3 face buttons. -->
  <div class="pad" id="pad-right">
    <button class="btn btn-wide" id="btn-rotate" aria-label="Rotate">ROTATE</button>
    <button class="btn btn-wide" id="btn-drop" aria-label="Hard drop">DROP</button>
  </div>

  <a class="back" href="../../index.html">← Back to games</a>

  <!-- Tap to fill the screen (hides the browser's URL bar) where supported. -->
  <button id="btn-fullscreen" aria-label="Toggle fullscreen">⛶</button>

  <!-- Shown only on a phone held in portrait. -->
  <div id="rotate-hint">
    <div class="spin">🔄</div>
    <div>Turn your phone sideways to play Tetris</div>
  </div>

  <script>
    // Wire up the fullscreen toggle. Tapping it asks the browser to make the
    // page fill the whole screen (which hides the URL bar); tapping again
    // leaves fullscreen. Some phones -- notably iPhones -- don't allow web
    // pages to go fullscreen, so if it isn't supported we just remove the
    // button rather than show one that does nothing.
    (function () {
      var btn = document.getElementById("btn-fullscreen");
      var el = document.documentElement;
      var canFullscreen = !!(el.requestFullscreen || el.webkitRequestFullscreen);

      if (!canFullscreen) {
        btn.remove();
        return;
      }

      btn.addEventListener("pointerup", function (event) {
        event.preventDefault();
        if (document.fullscreenElement || document.webkitFullscreenElement) {
          (document.exitFullscreen || document.webkitExitFullscreen).call(document);
        } else {
          (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
        }
      });
    })();
  </script>

  <!-- Load the game files in order, smallest first, just like the Python
       imports at the top of tetris.py. tetris.js uses the others, so it
       comes last. -->
  <script src="shapes.js"></script>
  <script src="board.js"></script>
  <script src="controls.js"></script>
  <script src="tetris.js"></script>
</body>
</html>
