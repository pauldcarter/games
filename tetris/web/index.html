<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Tetris</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #2a2f3d;   /* lighter than the black playfield so it stands out */
      color: #f0f2f8;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 { margin: 1rem 0 0.25rem; letter-spacing: 0.05em; }
    .hint { color: #c2c7d6; font-size: 0.9rem; margin: 0 0 1rem; }
    a.back { color: #6cd0ff; text-decoration: none; margin-top: 1rem; }
    canvas {
      background: #000;
      /* A clear border + glow so the black playfield reads as its own panel,
         distinct from the page behind it. */
      border: 2px solid #4cc2ff;
      border-radius: 8px;
      box-shadow: 0 0 0 1px #000, 0 8px 24px rgba(0, 0, 0, 0.5);
      /* Crisp blocks, no blurry scaling. */
      image-rendering: pixelated;
      /* Never let the board overflow -- it scales down to fit. The canvas keeps
         its own internal pixel resolution; only the displayed size changes, so
         the blocks stay sharp. */
      max-width: 100%;
      max-height: 100%;
    }

    /* ---- The on-screen gamepad ----
       Two thumb clusters that flank the board, mirroring a PS3 pad: directions
       on the LEFT, action buttons (rotate/drop) on the RIGHT. Hidden by default
       (desktop); only shown on a touch phone in landscape, further down. */
    .pad {
      display: none;
      flex-direction: column;
      gap: 14px;
      align-items: center;
      justify-content: center;
    }
    .pad-row { display: flex; gap: 14px; }
    .btn {
      width: 72px;
      height: 72px;
      border-radius: 14px;
      border: 2px solid #4cc2ff;
      background: rgba(76, 194, 255, 0.15);
      color: #f0f2f8;
      font-size: 1.6rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;       /* taps drive the game, never scroll/zoom */
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { background: rgba(76, 194, 255, 0.4); }
    /* The bottom button in each pad stretches across both top buttons, so each
       pad is "two buttons on a row, one wide button below". */
    .btn-wide { width: 158px; font-size: 1rem; }

    /* A little fullscreen toggle, tucked in the top-right corner. Tapping it
       makes the game take the whole screen (hiding the browser's URL bar) on
       phones that support it. Hidden by default; revealed on touch landscape,
       and removed entirely by JS on phones that can't go fullscreen (iPhone). */
    #btn-fullscreen {
      display: none;
      position: fixed;
      top: 6px;
      right: 6px;
      z-index: 10;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: 1px solid #4cc2ff;
      background: rgba(76, 194, 255, 0.12);
      color: #f0f2f8;
      font-size: 1.1rem;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* Shown only on a phone held in portrait (set up by the media query). */
    #rotate-hint { display: none; }

    /* ---- The login screen ----
       A full-page panel shown before the game starts, where the player types
       their name. JS hides it (sets display:none) once they press Play. */
    #login {
      position: fixed;
      inset: 0;
      z-index: 20;
      background: #2a2f3d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      text-align: center;
      padding: 2rem;
      box-sizing: border-box;
    }
    #login h2 { margin: 0; letter-spacing: 0.08em; color: #6cd0ff; font-size: 2.4rem; }
    #login p { margin: 0; color: #c2c7d6; }
    #login input {
      font-size: 1.4rem;
      padding: 0.5rem 0.75rem;
      width: min(280px, 80vw);
      text-align: center;
      border: 2px solid #4cc2ff;
      border-radius: 8px;
      background: #000;
      color: #f0f2f8;
      outline: none;
    }
    #login button {
      font-size: 1.2rem;
      padding: 0.5rem 1.5rem;
      border: 2px solid #4cc2ff;
      border-radius: 8px;
      background: rgba(76, 194, 255, 0.15);
      color: #f0f2f8;
      cursor: pointer;
    }
    #login button:active { background: rgba(76, 194, 255, 0.4); }

    /* ---- The Top Scores list on the login screen ---- */
    #leaderboard {
      width: min(320px, 86vw);
      margin-top: 0.5rem;
    }
    #leaderboard h3 {
      margin: 0 0 0.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: #8a93a8;
      text-transform: uppercase;
    }
    #leaderboard ol {
      list-style: none;
      margin: 0;
      padding: 0;
      font-variant-numeric: tabular-nums;
    }
    #leaderboard li {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.3rem 0.6rem;
      border-radius: 6px;
      font-size: 1rem;
    }
    /* Zebra striping so rows are easy to read. */
    #leaderboard li:nth-child(odd) { background: rgba(255, 255, 255, 0.04); }
    /* The current player's most recent row, lit up so they spot themselves. */
    #leaderboard li.you {
      background: rgba(76, 194, 255, 0.18);
      color: #6cd0ff;
      font-weight: 600;
    }
    #leaderboard .rank { color: #8a93a8; width: 1.5rem; text-align: right; }
    #leaderboard li.you .rank { color: #6cd0ff; }
    #leaderboard .who { flex: 1; text-align: left; padding-left: 0.6rem;
                        overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #leaderboard .pts { text-align: right; }
    #leaderboard .empty { color: #8a93a8; font-size: 0.9rem; padding: 0.3rem 0.6rem; }

    /* On a touch phone in LANDSCAPE: lay the page out as one row,
       [ D-pad ] [ board ] [ actions ], sized to the screen height. */
    @media (hover: none) and (pointer: coarse) and (orientation: landscape) {
      h1, .hint, a.back { display: none; }   /* free up space for the game */
      body {
        flex-direction: row;
        justify-content: center;
        gap: 16px;
        height: 100vh;       /* fallback for old browsers */
        height: 100dvh;      /* the *visible* height -- grows as the URL bar
                                collapses, so the game fills the real screen */
        padding: 8px;
        box-sizing: border-box;
      }
      /* Reveal both thumb pads and give them the SAME fixed width so the board
         sits dead-centre between them. Make them full-height so we can place
         buttons at the middle and the bottom. */
      .pad { display: flex; width: 180px; flex: 0 0 180px; height: 100%; position: relative; }
      canvas { height: 100%; width: auto; }  /* board fills the height */
      /* The rotate buttons stay centred (the pad's justify-content: center does
         that, since DROP is taken out of the flow below); DROP is pinned to the
         very bottom of the right column. */
      #btn-drop {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
      }
      #btn-fullscreen { display: flex; }     /* offer the fullscreen toggle */
    }

    /* On a touch phone in PORTRAIT: ask the player to turn sideways rather than
       cram the landscape gamepad into a tall, narrow screen. */
    @media (hover: none) and (pointer: coarse) and (orientation: portrait) {
      h1, .hint, a.back, canvas, .pad { display: none; }
      #rotate-hint {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        height: 100vh;
        height: 100dvh;
        text-align: center;
        font-size: 1.3rem;
        padding: 2rem;
        box-sizing: border-box;
      }
      #rotate-hint .spin { font-size: 3rem; }
    }
  </style>
</head>
<body>
  <!-- The login screen: shown first, hidden by JS once the player presses Play.
       Their name is used on the shared leaderboard. -->
  <div id="login">
    <h2>TETRIS</h2>
    <p>Type your name to start:</p>
    <input id="login-name" type="text" maxlength="12" placeholder="Your name"
           autocomplete="off" autofocus>
    <button id="login-go">Play</button>

    <!-- The shared Top Scores. Filled in by JS (renderLeaderboard in tetris.js)
         each time this screen is shown, so it always reflects the latest board,
         including a score you just set. -->
    <div id="leaderboard">
      <h3>Top Scores</h3>
      <ol id="leaderboard-list"></ol>
    </div>
  </div>

  <h1>Tetris</h1>
  <p class="hint">← → move &nbsp;·&nbsp; ↑ rotate &nbsp;·&nbsp; ↓ soft drop &nbsp;·&nbsp; Space hard drop</p>

  <!-- LEFT thumb pad: move left / right. Direct body child so it sits to the
       board's left in the landscape row layout. -->
  <div class="pad" id="pad-left">
    <div class="pad-row">
      <button class="btn" id="btn-left" aria-label="Move left">◀</button>
      <button class="btn" id="btn-right" aria-label="Move right">▶</button>
    </div>
  </div>

  <canvas id="game"></canvas>

  <!-- RIGHT thumb pad: the two rotate buttons sit in the middle (next to the
       board); DROP is pushed to the very bottom of the column. -->
  <div class="pad" id="pad-right">
    <div class="pad-row">
      <button class="btn" id="btn-rotate-ccw" aria-label="Rotate left">↺</button>
      <button class="btn" id="btn-rotate" aria-label="Rotate right">↻</button>
    </div>
    <button class="btn btn-wide" id="btn-drop" aria-label="Hard drop">DROP</button>
  </div>

  <a class="back" href="../../index.html">← Back to games</a>

  <!-- Tap to fill the screen (hides the browser's URL bar) where supported. -->
  <button id="btn-fullscreen" aria-label="Toggle fullscreen">⛶</button>

  <!-- Shown only on a phone held in portrait. -->
  <div id="rotate-hint">
    <div class="spin">🔄</div>
    <div>Turn your phone sideways to play Tetris</div>
  </div>

  <script>
    // Wire up the fullscreen toggle. Tapping it asks the browser to make the
    // page fill the whole screen (which hides the URL bar); tapping again
    // leaves fullscreen. Some phones -- notably iPhones -- don't allow web
    // pages to go fullscreen, so if it isn't supported we just remove the
    // button rather than show one that does nothing.
    (function () {
      var btn = document.getElementById("btn-fullscreen");
      var el = document.documentElement;
      var canFullscreen = !!(el.requestFullscreen || el.webkitRequestFullscreen);

      if (!canFullscreen) {
        btn.remove();
        return;
      }

      btn.addEventListener("pointerup", function (event) {
        event.preventDefault();
        if (document.fullscreenElement || document.webkitFullscreenElement) {
          (document.exitFullscreen || document.webkitExitFullscreen).call(document);
        } else {
          (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
        }
      });
    })();
  </script>

  <!-- Load the game files in order, smallest first, just like the Python
       imports at the top of tetris.py. tetris.js uses the others, so it
       comes last.

       The "?v=" on each file is a CACHE-BUSTER. Browsers (and GitHub Pages)
       hang on to old copies of scripts to load faster, which is why a change
       can seem to "do nothing" until you hard-refresh. Changing the version
       number makes the browser see a new address and fetch a fresh copy.
       SO: whenever you edit any of these files, bump this number (v=2 -> v=3).
       Keep them all the same number so it's easy to remember. -->
  <script src="shapes.js?v=4"></script>
  <script src="board.js?v=4"></script>
  <script src="controls.js?v=4"></script>
  <script src="scores.js?v=4"></script>
  <script src="tetris.js?v=4"></script>
</body>
</html>
