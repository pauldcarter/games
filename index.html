<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Games</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Games</h1>
    <p class="tagline">Little games you can play right in the browser.</p>
  </header>

  <main>
    <!-- ============================================================ -->
    <!-- ONE CARD PER GAME. To add a new game: copy a whole <a> block -->
    <!-- below, point href at your new game's built page, and change  -->
    <!-- the emoji, title, and description.                           -->
    <!-- ============================================================ -->
    <div class="grid">

      <a class="card" href="tetris/web/index.html">
        <span class="thumb">🟦</span>
        <span class="title">Tetris</span>
        <span class="desc">Stack the falling blocks. Arrow keys to move, Up to rotate, Space to drop.</span>
      </a>

    </div>
  </main>

  <footer>
    <p>Built with Python &amp; pygame, running in your browser.</p>
  </footer>
</body>
</html>
